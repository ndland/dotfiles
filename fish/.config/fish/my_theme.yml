# yaml-language-server: $schema=https://raw.githubusercontent.com/JanDeDobbeleer/oh-my-posh/main/themes/schema.json

blocks:
    - type: rprompt
      segments:
        - leading_diamond: 
          template: ' {{ .Env.POSH_GITHUB_USER }} '
          foreground: '#24283b'
          background: '#7dcfff'
          type: text
          style: diamond
        - options:
            time_format: "15:04:05"
          leading_diamond: 
          trailing_diamond: 
          template: ' {{ .CurrentDate | date .Format }} '
          foreground: '#24283b'
          background: '#f7768e'
          type: time
          style: diamond
    - type: prompt
      alignment: left
      segments:
        - leading_diamond: 
          trailing_diamond: 
          template: ' {{ .UserName }} '
          foreground: '#24283b'
          background: '#ff9e64'
          type: session
          style: diamond
        - options:
            style: folder
          trailing_diamond: 
          template: ' {{ .Path }} '
          foreground: '#24283b'
          background: '#7aa2f7'
          type: path
          style: diamond
        - options:
            fetch_status: true
            fetch_upstream_icon: true
            mapped_branches:
                bug/*: "\U0001F41B "
                feature/*: "\U0001F680 "
            # source: cli
            untracked_modes:
                /Users/user/Projects/oh-my-posh/: "no"
          trailing_diamond: 
          template: '{{ .UpstreamIcon }}{{ .HEAD }}{{if .BranchStatus }} {{ .BranchStatus }}{{ end }}{{ if .Working.Changed }}  {{ .Working.String }}{{ end }}{{ if and (.Working.Changed) (.Staging.Changed) }} |{{ end }}{{ if .Staging.Changed }}  {{ .Staging.String }}{{ end }}{{ if gt .StashCount 0 }}  {{ .StashCount }}{{ end }}'
          foreground: '#24283b'
          background: '#bb9af7'
          type: git
          style: diamond
          background_templates:
            - '{{ if or (.Working.Changed) (.Staging.Changed) }}#bb9af7{{ end }}'
            - '{{ if and (gt .Ahead 0) (gt .Behind 0) }}#bb9af7{{ end }}'
            - '{{ if gt .Ahead 0 }}#7aa2f7{{ end }}'
            - '{{ if gt .Behind 0 }}#f7768e{{ end }}'
        - trailing_diamond: 
          template: '  {{ .Full }} '
          foreground: '#24283b'
          background: '#9ece6a'
          type: node
          style: diamond
        # - trailing_diamond: 
        #   template: " \U000F011B {{ .Full }} "
        #   foreground: '#1f2335'
        #   background: '#7dcfff'
        #   type: yarn
        #   style: diamond
      newline: true
version: 4
final_space: true
